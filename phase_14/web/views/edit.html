<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Item | Phase 13</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">PHASE 13</div>
        <a href="/views/dashboard.html">Dashboard</a>
        <a href="/views/create.html">Create Item</a>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="topbar">
            <div>
                <h1>Edit Item</h1>
                <p>Update item information</p>
            </div>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>

        <div id="loadingBox" class="loading-box">
            <div class="spinner"></div>
            Loading item...
        </div>

        <div id="errorBox" class="empty-state hidden">
            <h2 id="errorTitle">Item Not Found</h2>
            <p id="errorMsg">The requested item could not be loaded.</p>
            <a href="/views/dashboard.html" class="btn btn-primary" style="display:inline-block; margin-top:20px;">Back to Dashboard</a>
        </div>

        <div class="form-page hidden" id="contentBox">
            <div class="form-card">
                <label>Title <span style="color:red">*</span></label>
                <input type="text" id="itemTitle" class="input" placeholder="Enter title">

                <label>Details</label>
                <textarea id="itemDetails" class="input" placeholder="Enter details"></textarea>

                <div style="display:flex; gap:10px;">
                    <button class="btn btn-primary btn-block" id="btnSave" onclick="doSave()">Save Changes</button>
                    <button class="btn btn-secondary btn-block" onclick="goBack()">Cancel</button>
                </div>
                <div id="editMsg"></div>
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/pages/edit_item.js"></script>
</body>
</html>
